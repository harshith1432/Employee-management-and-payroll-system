<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Credentials | AI HRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0D9488;
            --primary-glow: rgba(13, 148, 136, 0.4);
            --bg-deep: #020617;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-deep); color: #f8fafc; }
        .plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0D9488 0%, #065F46 100%);
            box-shadow: 0 10px 20px -10px var(--primary-glow);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px var(--primary-glow);
            filter: brightness(1.1);
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .security-step {
            transition: all 0.3s ease;
        }
        .security-step.valid { color: #2DD4BF; }
        .security-step.valid i { color: #2DD4BF; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen overflow-hidden relative">
    <!-- Animated Background Orbs -->
    <div class="orb w-[500px] h-[500px] bg-teal-500/10 top-[-100px] right-[-100px]"></div>
    <div class="orb w-[400px] h-[400px] bg-purple-500/5 bottom-[-50px] left-[-50px]"></div>

    <div class="glass-container p-12 rounded-[2.5rem] w-full max-w-md relative z-10 border border-white/5">
        <div class="text-center mb-12">
            <div class="w-16 h-16 bg-teal-500/20 rounded-2xl flex items-center justify-center border border-teal-500/30 mx-auto mb-6">
                <i class="fas fa-shield-halved text-teal-400 text-3xl"></i>
            </div>
            <h1 class="plus-jakarta text-3xl font-extrabold text-white tracking-tight mb-2">Secure Your Account</h1>
            <p class="text-slate-400 font-medium">Please set a permanent password</p>
        </div>
        
        <form id="resetForm" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">New Secret Key</label>
                <div class="relative">
                    <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="password" required placeholder="Min. 8 characters" 
                           class="input-glass w-full pl-12 pr-4 py-4 rounded-2xl text-white outline-none placeholder:text-slate-600">
                </div>
            </div>
            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Confirm Secret Key</label>
                <div class="relative">
                    <i class="fas fa-check-double absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="confirmPassword" required placeholder="Repeat keys" 
                           class="input-glass w-full pl-12 pr-4 py-4 rounded-2xl text-white outline-none placeholder:text-slate-600">
                </div>
            </div>

            <!-- Security Requirements -->
            <div class="bg-white/5 rounded-2xl p-5 border border-white/5 space-y-3">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Security Matrix</p>
                <div id="req-length" class="security-step flex items-center gap-3 text-xs font-medium text-slate-400">
                    <i class="fas fa-circle-notch text-[8px]"></i>
                    <span>Minimum 8 specialized characters</span>
                </div>
                <div id="req-match" class="security-step flex items-center gap-3 text-xs font-medium text-slate-400">
                    <i class="fas fa-circle-notch text-[8px]"></i>
                    <span>Key pair synchronization confirmed</span>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" disabled class="btn-primary w-full py-4 rounded-2xl text-white font-extrabold uppercase tracking-widest text-sm mt-4 opacity-50 cursor-not-allowed">
                Initialize Account
            </button>
        </form>
        
        <div id="errorBox" class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl hidden">
            <p id="errorMsg" class="text-red-400 text-[10px] font-bold text-center uppercase tracking-wider"></p>
        </div>

        <div id="successBox" class="mt-6 p-4 bg-teal-500/10 border border-teal-500/20 rounded-xl hidden">
            <p id="successMsg" class="text-teal-400 text-[10px] font-bold text-center uppercase tracking-wider"></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const passInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        
        const reqLength = document.getElementById('req-length');
        const reqMatch = document.getElementById('req-match');

        function validateForm() {
            const pass = passInput.value;
            const confirm = confirmInput.value;
            
            const isLongEnough = pass.length >= 8;
            const isMatch = pass === confirm && pass.length > 0;

            // Update UI
            if (isLongEnough) {
                reqLength.classList.add('valid');
                reqLength.querySelector('i').className = 'fas fa-check-circle';
            } else {
                reqLength.classList.remove('valid');
                reqLength.querySelector('i').className = 'fas fa-circle-notch';
            }

            if (isMatch) {
                reqMatch.classList.add('valid');
                reqMatch.querySelector('i').className = 'fas fa-check-circle';
            } else {
                reqMatch.classList.remove('valid');
                reqMatch.querySelector('i').className = 'fas fa-circle-notch';
            }

            // Toggle Button
            if (isLongEnough && isMatch) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        passInput.addEventListener('input', validateForm);
        confirmInput.addEventListener('input', validateForm);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passInput.value;
            const errorBox = document.getElementById('errorBox');
            const errorMsg = document.getElementById('errorMsg');
            const successBox = document.getElementById('successBox');
            
            errorBox.classList.add('hidden');
            
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    successBox.classList.remove('hidden');
                    document.getElementById('successMsg').innerText = "SECURITY OVERRIDE SUCCESSFUL. REDIRECTING...";
                    submitBtn.disabled = true;
                    
                    // Redirect based on role
                    const role = localStorage.getItem('role');
                    setTimeout(() => {
                        if (role === 'admin') window.location.href = '/';
                        else if (role === 'hr') window.location.href = '/hr';
                        else window.location.href = '/employee';
                    }, 2000);
                } else {
                    errorMsg.innerText = data.msg.toUpperCase();
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = "CRITICAL: SECURITY HANDSHAKE FAILED";
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
