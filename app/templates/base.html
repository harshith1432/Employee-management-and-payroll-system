<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI HRMS | The Future of Work{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root[data-theme='dark'] {
            --primary: #0D9488;
            --primary-glow: rgba(13, 148, 136, 0.3);
            --bg-deep: #020617;
            --bg-secondary: #0f172a;
            --surface-glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --nav-active-bg: rgba(13, 148, 136, 0.15);
            --input-bg: rgba(255, 255, 255, 0.03);
            --accent-gradient: linear-gradient(135deg, #0d9488 0%, #065f46 100%);
        }
        :root[data-theme='light'] {
            --primary: #0D9488;
            --primary-glow: rgba(13, 148, 136, 0.1);
            --bg-deep: #f8fafc;
            --bg-secondary: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --nav-active-bg: rgba(13, 148, 136, 0.08);
            --input-bg: rgba(15, 23, 42, 0.03);
            --accent-gradient: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-deep); color: var(--text-main); margin: 0; padding: 0; transition: background-color 0.4s ease, color 0.4s ease; overflow: hidden; }
        .plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .sidebar { background: var(--surface-glass); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 50; }
        .topbar { background: var(--surface-glass); backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); }
        
        .glass-card { background: var(--surface-glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 1.5rem; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px -12px var(--primary-glow); }
        
        .glass-input { background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 1rem; color: var(--text-main); outline: none; transition: all 0.3s ease; }
        .glass-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }
        
        .nav-link { position: relative; transition: all 0.3s ease; color: var(--text-muted); }
        .nav-link:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .nav-link.active { background: var(--nav-active-bg); color: var(--primary); }
        .nav-link.active::before { content: ''; position: absolute; left: 0; top: 25%; height: 50%; width: 4px; background: var(--primary); border-radius: 0 4px 4px 0; box-shadow: 0 0 12px var(--primary); }
        
        .accent-button { background: var(--accent-gradient); color: white; border-radius: 1rem; font-weight: 700; transition: all 0.3s ease; box-shadow: 0 4px 15px -5px var(--primary); }
        .accent-button:hover { transform: scale(1.02); filter: brightness(1.1); }
        .accent-button:active { transform: scale(0.98); }

        .main-gradient { position: fixed; top: 0; right: 0; width: 40vw; height: 40vw; background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%); pointer-events: none; }
        .secondary-gradient { position: fixed; bottom: 0; left: 0; width: 30vw; height: 30vw; background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, transparent 70%); pointer-events: none; }
    </style>
    <script>
        // Initial Theme Check
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body class="flex min-h-screen">
    <div class="main-gradient"></div>
    <div class="secondary-gradient"></div>

    <!-- Sidebar -->
    <aside class="sidebar w-72 flex flex-col p-6 space-y-8">
        <div class="plus-jakarta text-2xl font-extrabold flex items-center space-x-3 group">
            <div class="w-10 h-10 bg-teal-500/20 rounded-xl flex items-center justify-center border border-teal-500/30 group-hover:scale-110 transition-transform">
                <i class="fas fa-brain text-teal-400"></i>
            </div>
            <span class="tracking-tight group-hover:text-teal-400 transition-colors">AI HRMS</span>
        </div>
        
        <nav class="flex-1 space-y-3" id="navBar">
            <!-- Sidebar links will be dynamically populated -->
        </nav>

        <div class="pt-6 space-y-4 border-t border-white/10">
            <!-- Theme Toggle -->
            <button id="themeToggle" class="w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-lg bg-teal-500/20 flex items-center justify-center">
                        <i class="fas fa-moon text-teal-400 group-hover:hidden" id="themeIconDark"></i>
                        <i class="fas fa-sun text-teal-400 hidden group-hover:block" id="themeIconLight"></i>
                    </div>
                    <span class="font-bold text-sm tracking-tight" id="themeText">Dark View</span>
                </div>
                <div class="w-10 h-5 bg-slate-800 rounded-full p-1 relative border border-white/10">
                    <div id="toggleCircle" class="w-3 h-3 bg-teal-500 rounded-full transition-all absolute left-1"></div>
                </div>
            </button>

            <button id="logoutBtn" class="w-full flex items-center space-x-3 p-4 rounded-xl text-red-400 hover:bg-red-500/10 transition-all hover:text-red-300">
                <i class="fas fa-power-off"></i>
                <span class="font-bold">Logout Session</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Topbar -->
        <header class="topbar h-20 flex items-center justify-between px-10 flex-shrink-0 relative z-40">
            <div class="flex flex-col">
                <p class="text-xs font-bold text-teal-500 uppercase tracking-widest mb-1">Systems Operations</p>
                <h1 class="plus-jakarta text-2xl font-bold uppercase tracking-tight">{% block header %}{% endblock %}</h1>
            </div>
            <div class="flex items-center space-x-6">
                <div class="h-10 w-px bg-white/10"></div>
                <div class="flex items-center space-x-4 bg-white/5 pl-4 pr-2 py-2 rounded-2xl border border-white/10">
                    <div class="text-right">
                        <p class="text-sm font-bold leading-tight" id="userName">User Profile</p>
                        <p class="text-[10px] text-teal-500 font-bold uppercase tracking-tighter" id="userRole">Administrator</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User&background=0D9488&color=fff" class="w-10 h-10 rounded-xl border border-teal-500/30">
                </div>
            </div>
        </header>

        <!-- Dynamic Content -->
        <main class="flex-1 overflow-y-auto p-10 custom-scrollbar relative z-30">
            <style>
                .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(13, 148, 136, 0.2); border-radius: 10px; }
                .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(13, 148, 136, 0.3); }
            </style>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Common JS for token management, logout, etc.
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        const user = localStorage.getItem('user');
        
        if (!token && window.location.pathname !== '/login' && window.location.pathname !== '/register') {
            window.location.href = '/login';
        }

        // Dynamic Navigation based on role
        const navBar = document.getElementById('navBar');
        const userRole = (role || 'employee').toLowerCase();
        
        const navItems = {
            admin: [
                { id: 'nav-dashboard', href: '/', icon: 'fas fa-th-large', text: 'Admin Console' },
                { id: 'nav-employees', href: '/employees', icon: 'fas fa-user-tie', text: 'HR Management' },
                { id: 'nav-transactions', href: '/transactions', icon: 'fas fa-money-bill-transfer', text: 'Latest Transaction' },
                { id: 'nav-leaves', href: '/leaves', icon: 'fas fa-calendar-day', text: 'System Leaves' }
            ],
            hr: [
                { id: 'nav-dashboard', href: '/', icon: 'fas fa-th-large', text: 'Operations' },
                { id: 'nav-employees', href: '/employees', icon: 'fas fa-user-group', text: 'Employees' },
                { id: 'nav-attendance', href: '/attendance', icon: 'fas fa-clipboard-user', text: 'Attendance' },
                { id: 'nav-payroll', href: '/payroll', icon: 'fas fa-money-check-dollar', text: 'Payroll' },
                { id: 'nav-leaves', href: '/leaves', icon: 'fas fa-calendar-day', text: 'Leave Requests' }
            ],
            employee: [
                { id: 'nav-dashboard', href: '/', icon: 'fas fa-house', text: 'My Dashboard' },
                { id: 'nav-attendance', href: '/attendance', icon: 'fas fa-clock', text: 'Attendance' },
                { id: 'nav-payroll', href: '/payroll', icon: 'fas fa-receipt', text: 'Salary Slips' },
                { id: 'nav-leaves', href: '/leaves', icon: 'fas fa-plane-departure', text: 'Request Leave' }
            ]
        };

        if(navItems[userRole]) {
            navItems[userRole].forEach(item => {
                const link = `
                    <a href="${item.href}" class="nav-link flex items-center space-x-3 p-4 rounded-xl transition-all" id="${item.id}">
                        <i class="${item.icon} text-lg"></i>
                        <span class="font-medium">${item.text}</span>
                    </a>
                `;
                navBar.innerHTML += link;
            });
        }

        // Set Profile Info
        if (role) {
            document.getElementById('userRole').innerText = role;
            document.getElementById('userName').innerText = localStorage.getItem('userEmail') || 'User Profile';
        }

        // Set active nav item
        const currentPath = window.location.pathname;
        const activeItem = navItems[userRole]?.find(i => i.href === currentPath);
        if (activeItem) {
            const el = document.getElementById(activeItem.id);
            if(el) el.classList.add('active');
        }
        
        // Theme Toggle Logic
        const themeBtn = document.getElementById('themeToggle');
        const themeText = document.getElementById('themeText');
        const toggleCircle = document.getElementById('toggleCircle');

        function updateThemeUI(theme) {
            if (theme === 'light') {
                themeText.innerText = 'Light View';
                toggleCircle.style.left = 'calc(100% - 16px)';
                document.getElementById('themeIconDark').classList.add('hidden');
                document.getElementById('themeIconLight').classList.remove('hidden');
            } else {
                themeText.innerText = 'Dark View';
                toggleCircle.style.left = '4px';
                document.getElementById('themeIconDark').classList.remove('hidden');
                document.getElementById('themeIconLight').classList.add('hidden');
            }
        }

        // Initialize UI
        updateThemeUI(document.documentElement.getAttribute('data-theme'));

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/login';
        });
    </script>
</body>
</html>
