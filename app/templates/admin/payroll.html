{% extends "base.html" %}

{% block title %}Payroll - AI HRMS{% endblock %}
{% block header %}Financial Disbursement{% endblock %}

{% block content %}
<!-- Control Panel -->
<div id="adminPayrollControls" class="glass-card mb-8">
    <div class="p-8 border-b border-[var(--border-glass)] flex flex-col md:flex-row justify-between items-center bg-[var(--bg-glass)] gap-6">
        <div>
            <h3 class="plus-jakarta text-2xl font-extrabold text-[var(--text-main)] tracking-tight">Payroll Engine</h3>
            <p class="text-[var(--text-muted)] text-sm font-medium mt-1">Process and audit monthly compensation cycles</p>
        </div>
        
        <div class="flex items-center gap-4 bg-[var(--bg-glass)] p-2 rounded-3xl border border-[var(--border-glass)]">
            <select id="month" class="bg-transparent text-[var(--text-main)] text-sm font-bold px-4 py-2 outline-none border-r border-[var(--border-glass)] cursor-pointer hover:text-teal-400 transition-colors">
                <option value="1" class="bg-[var(--bg-main)]">JANUARY</option>
                <option value="2" class="bg-[var(--bg-main)]">FEBRUARY</option>
                <option value="3" class="bg-[var(--bg-main)]">MARCH</option>
                <option value="4" class="bg-[var(--bg-main)]">APRIL</option>
                <option value="5" class="bg-[var(--bg-main)]">MAY</option>
                <option value="6" class="bg-[var(--bg-main)]">JUNE</option>
                <option value="7" class="bg-[var(--bg-main)]">JULY</option>
                <option value="8" class="bg-[var(--bg-main)]">AUGUST</option>
                <option value="9" class="bg-[var(--bg-main)]">SEPTEMBER</option>
                <option value="10" class="bg-[var(--bg-main)]">OCTOBER</option>
                <option value="11" class="bg-[var(--bg-main)]">NOVEMBER</option>
                <option value="12" class="bg-[var(--bg-main)]">DECEMBER</option>
            </select>
            <input type="number" id="year" value="2026" class="bg-transparent text-[var(--text-main)] text-sm font-bold px-4 py-2 outline-none w-20 cursor-pointer hover:text-teal-400 transition-colors">
            <button id="generateBtn" class="bg-teal-500 hover:bg-teal-400 text-white px-6 py-2 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all shadow-lg shadow-teal-500/20 active:scale-95">
                Run Cycle
            </button>
            <button id="reportBtn" class="bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2 rounded-2xl font-black uppercase tracking-widest text-[10px] transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                <i class="fas fa-file-pdf mr-2"></i> Report
            </button>
        </div>
    </div>
    
    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-[10px] font-black text-[var(--text-muted)] uppercase tracking-widest border-b border-[var(--border-glass)] bg-[var(--bg-glass)]">
                    <th class="px-8 py-5">Personnel</th>
                    <th class="px-8 py-5">Temporal Index</th>
                    <th class="px-8 py-5">Status</th>
                    <th class="px-8 py-5">Net Disbursement</th>
                    <th class="px-8 py-5 text-right">Documents</th>
                </tr>
            </thead>
            <tbody id="payrollTable" class="text-[var(--text-main)] divide-y divide-[var(--border-glass)]">
                <!-- History rows injected via JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const MONTH_NAMES = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

    async function fetchPayroll() {
        const role = localStorage.getItem('role') || 'employee';
        if (role.toLowerCase() === 'employee') {
            const controls = document.getElementById('adminPayrollControls');
            if (controls) controls.classList.add('hidden');
        }

        const body = document.getElementById('payrollTable');
        body.innerHTML = `<tr><td colspan="4" class="px-8 py-20 text-center text-[var(--text-muted)] font-medium italic">Synchronizing financial ledger...</td></tr>`;

        try {
            const res = await fetch('/api/payroll/history', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await res.json();
            body.innerHTML = '';
            
            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="px-8 py-20 text-center text-[var(--text-muted)] font-medium">No payroll cycles initiated.</td></tr>`;
                return;
            }

            data.forEach(p => {
                body.innerHTML += `
                    <tr class="group hover:bg-[var(--bg-glass)] transition-colors border-b border-[var(--border-glass)]">
                        <td class="px-8 py-6">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full bg-teal-500/10 flex items-center justify-center text-teal-400 font-black text-xs border border-teal-500/20">
                                    ${p.emp_id.slice(-2)}
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[var(--text-main)] font-bold text-sm tracking-tight">${p.name || 'Personal Record'}</span>
                                    <span class="text-[var(--text-muted)] text-[10px] font-black tracking-widest uppercase">${p.emp_id}</span>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex flex-col">
                                <span class="text-[var(--text-main)] font-bold text-xs tracking-tight">${MONTH_NAMES[p.month-1]}</span>
                                <span class="text-[var(--text-muted)] text-[10px] font-medium tracking-widest">${p.year}</span>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-teal-500/10 text-teal-400 ring-1 ring-teal-400/20">
                                ${p.status}
                            </span>
                        </td>
                        <td class="px-8 py-6">
                            <span class="text-[var(--text-main)] font-mono font-bold tracking-tighter text-base">₹ ${p.net_salary.toLocaleString()}</span>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <button onclick="downloadSlip(${p.id})" class="p-3 rounded-xl bg-[var(--bg-glass)] text-[var(--text-muted)] hover:bg-teal-500/20 hover:text-teal-400 transition-all opacity-0 group-hover:opacity-100 flex items-center gap-2 ml-auto border border-[var(--border-glass)]">
                                <i class="fas fa-download"></i>
                                <span class="text-[10px] font-black uppercase tracking-widest">SLIP</span>
                            </button>
                        </td>
                    </tr>
                `;
            });
        } catch (err) {
            body.innerHTML = `<tr><td colspan="4" class="px-8 py-20 text-center text-red-400 font-medium uppercase tracking-widest">Ledger Sync Error</td></tr>`;
        }
    }

    document.getElementById('reportBtn').addEventListener('click', async () => {
        const month = document.getElementById('month').value;
        const year = document.getElementById('year').value;
        const btn = document.getElementById('reportBtn');
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> ...';
        btn.disabled = true;

        try {
            const res = await fetch(`/api/payroll/download-report?month=${month}&year=${year}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Payroll_Report_${month}_${year}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } else {
                alert("Failed to generate report.");
            }
        } catch (err) {
            alert("Report request failed.");
        } finally {
            btn.innerHTML = '<i class="fas fa-file-pdf mr-2"></i> Report';
            btn.disabled = false;
        }
    });

    async function downloadSlip(id) {
        // Use a direct download link or fetch with headers
        const res = await fetch(`/api/payroll/download-slip/${id}`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (res.ok) {
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Salary_Slip_${id}.pdf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } else {
            alert("Failed to download slip: Unauthorized or Not Found");
        }
    }

    document.getElementById('generateBtn').addEventListener('click', async () => {
        const month = document.getElementById('month').value;
        const year = document.getElementById('year').value;
        const btn = document.getElementById('generateBtn');
        
        btn.innerText = "PROCESSING...";
        btn.disabled = true;
        
        try {
            const res = await fetch('/api/payroll/generate', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ month, year })
            });
            const data = await res.json();
            alert(data.msg);
        } catch (err) {
            alert("Lifecycle generation failed.");
        } finally {
            btn.innerText = "RUN CYCLE";
            btn.disabled = false;
            fetchPayroll();
        }
    });

    fetchPayroll();
</script>
{% endblock %}
